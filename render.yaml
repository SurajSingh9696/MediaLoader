services:
  - type: web
    name: medialoader-backend
    runtime: python
    region: oregon
    plan: free
    rootDir: .
    buildCommand: pip install -r backend/requirements.txt
    startCommand: python -m uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: TEMP_DOWNLOAD_DIR
        value: /tmp/mediafetch
      - key: PYTHON_VERSION
        value: 3.12.0
    healthCheckPath: /health
