services:
  - type: web
    name: medialoader-backend
    runtime: python
    region: oregon
    plan: free
    rootDir: .
    buildCommand: |
      curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
      apt-get install -y nodejs
      pip install -r backend/requirements.txt
      npm install --prefix /opt/render/project/src/bgutil @yt-dlp/bgutil-ytdlp-pot-provider
    startCommand: bash backend/start.sh
    envVars:
      - key: TEMP_DOWNLOAD_DIR
        value: /tmp/mediafetch
      - key: PYTHON_VERSION
        value: 3.12.0
    healthCheckPath: /health
